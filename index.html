<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>1週間英語ラボ</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#131a29">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#0f1420; --panel:#171e2e; --panel2:#1e2740; --line:#2a3350;
  --txt:#e8edf7; --sub:#93a0bd; --accent:#4dd0c3; --accent2:#ff8a4c;
  --good:#4ade80; --warn:#fbbf24; --bad:#f87171; --chip:#243052;
  --shadow:0 8px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",system-ui,sans-serif;
  font-size:15px;line-height:1.55}
a{color:var(--accent)}
h1,h2,h3{margin:0 0 .4em}
h2{font-size:20px}
h3{font-size:16px}
.wrap{max-width:1080px;margin:0 auto;padding:14px 14px calc(96px + env(safe-area-inset-bottom))}
header.top{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,#131a29,#131a29ee);
  border-bottom:1px solid var(--line);backdrop-filter:blur(6px)}
header.top .in{max-width:1080px;margin:0 auto;padding:calc(11px + env(safe-area-inset-top)) 14px 11px;display:flex;align-items:center;gap:10px}
.logo{font-weight:800;letter-spacing:.02em;font-size:17px;display:flex;align-items:center;gap:8px}
.logo .b{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.grow{flex:1}
.btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:10px;
  padding:9px 13px;font-size:14px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:.12s}
.btn:hover{border-color:var(--accent)}
.btn:active{transform:translateY(1px)}
.btn.p{background:linear-gradient(135deg,var(--accent),#39b3a7);color:#062020;border:none}
.btn.o{background:linear-gradient(135deg,var(--accent2),#f5713a);color:#2a1200;border:none}
.btn.sm{padding:6px 10px;font-size:12.5px;border-radius:8px}
.btn.gho{background:transparent}
.btn.dang{color:var(--bad);border-color:#4a2530}
nav.tabs{display:flex;gap:2px;padding:7px 6px calc(7px + env(safe-area-inset-bottom));position:fixed;bottom:0;left:0;right:0;
  background:#131a29f2;border-top:1px solid var(--line);z-index:40;backdrop-filter:blur(8px)}
nav.tabs button{flex:1 1 0;min-width:0;background:none;border:none;color:var(--sub);font-size:10px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 0;cursor:pointer;border-radius:8px;white-space:nowrap}
nav.tabs button .ic{font-size:18px;line-height:1}
nav.tabs button.on{color:var(--accent)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card.pad0{padding:0;overflow:hidden}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:720px){.g3,.g4{grid-template-columns:repeat(2,1fr)}.hide-sp{display:none}}
@media(max-width:460px){.g2{grid-template-columns:1fr}}
label{display:block;font-size:12.5px;color:var(--sub);margin:10px 0 4px;font-weight:600}
input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  border-radius:10px;padding:10px 11px;font-size:16px;font-family:inherit} /* 16px未満だとiOSがフォーカス時に自動ズームして崩れる */
textarea{resize:vertical;min-height:64px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>*{flex:1;min-width:0}
.sub{color:var(--sub);font-size:13px}
.tiny{font-size:11.5px;color:var(--sub)}
.chip{display:inline-block;background:var(--chip);color:#b9c6e6;border-radius:999px;padding:3px 10px;font-size:11.5px;margin:2px 3px 2px 0}
.chip.a{background:#123c39;color:var(--accent)}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:4px 10px}
.mut{opacity:.55}
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:13px}
.kpi .n{font-size:26px;font-weight:800;letter-spacing:-.02em}
.kpi .l{font-size:11.5px;color:var(--sub);margin-top:2px}
.right{text-align:right}.center{text-align:center}
.score-big{font-size:44px;font-weight:800;line-height:1;letter-spacing:-.03em}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
th{color:var(--sub);font-weight:600;font-size:12px}
.scroll-x{overflow-x:auto}
.rank-badge{display:inline-flex;width:26px;height:26px;border-radius:50%;align-items:center;justify-content:center;font-weight:800;font-size:13px;background:var(--chip)}
.rank-badge.g1{background:linear-gradient(135deg,#ffd76a,#f0a933);color:#3a2400}
.rank-badge.g2{background:linear-gradient(135deg,#d6dae6,#a7afc4);color:#20242e}
.rank-badge.g3{background:linear-gradient(135deg,#e6a373,#c07840);color:#2a1400}
.bar-track{background:var(--panel2);border-radius:6px;height:8px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
/* モーダルはiPhoneのDynamic Island/ステータスバー/ホームバーを避ける（セーフエリア余白を上下に確保） */
.modal-bg{position:fixed;inset:0;background:#04070ecc;z-index:80;display:flex;align-items:flex-start;justify-content:center;
  padding:calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));overflow:auto}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:640px;width:100%;padding:16px;box-shadow:var(--shadow);margin:0 auto} /* 縦autoは長いモーダルで上端が届かなくなるため不可 */
@media(max-width:460px){.modal{padding:13px}.modal-bg{padding:calc(10px + env(safe-area-inset-top)) 8px calc(10px + env(safe-area-inset-bottom))}}
.modal h2{display:flex;align-items:center}
.x{background:var(--panel2);border:1px solid var(--line);border-radius:50%;color:var(--txt);font-size:20px;cursor:pointer;line-height:1;width:38px;height:38px;flex:0 0 auto;display:flex;align-items:center;justify-content:center} /* 38pxのタップ領域 */
/* モーダルのヘッダー行ごと固定→どんなに長くてもセーフエリア直下で×が常に押せる */
.mhead{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;background:var(--panel);margin:-16px -16px 6px;padding:14px 16px 8px;border-radius:16px 16px 0 0} /* 固定位置=modal-bgのpadding(セーフエリア込)直下になる */
@media(max-width:460px){.mhead{margin:-13px -13px 6px;padding:12px 13px 8px}}
.seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px;flex-wrap:wrap}
.seg button{flex:1;background:none;border:none;color:var(--sub);padding:7px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;min-width:60px}
.seg button.on{background:var(--accent);color:#062020}
.slider-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.slider-row label{margin:0;flex:0 0 92px;color:var(--txt)}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-row .v{flex:0 0 30px;text-align:center;font-weight:700;color:var(--accent)}
.empty{text-align:center;color:var(--sub);padding:36px 10px}
.empty .e{font-size:40px;margin-bottom:8px}
.list-item{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);margin-bottom:10px;cursor:pointer;transition:.12s}
.list-item:hover{border-color:var(--accent)}
.av{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#2b3a5e,#1c2embed);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0;color:#cdd9f5;background:linear-gradient(135deg,#2b3a5e,#233152)}
.hl{color:var(--accent);font-weight:700}
.warn-box{background:#2a2213;border:1px solid #4a3d17;color:#f5d38a;border-radius:10px;padding:10px 12px;font-size:12.5px}
.ok-box{background:#12281f;border:1px solid #1f4a34;color:#9be8bd;border-radius:10px;padding:10px 12px;font-size:12.5px}
.days7{display:flex;gap:6px;flex-wrap:wrap}
.day{flex:1;min-width:38px;text-align:center;border:1px solid var(--line);border-radius:10px;padding:8px 4px;background:var(--panel2)}
.day.done{background:#12281f;border-color:#1f4a34}
.day.miss{opacity:.5}
.day .dn{font-size:10px;color:var(--sub)}
.day .dm{font-weight:800;font-size:13px}
.timer-big{font-size:56px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em;text-align:center}
.fab{position:fixed;right:16px;bottom:78px;z-index:45}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#0b1220;border:1px solid var(--accent);
  color:var(--txt);padding:11px 18px;border-radius:12px;z-index:100;box-shadow:var(--shadow);font-weight:600;font-size:13.5px;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.divider{height:1px;background:var(--line);margin:14px 0}
details.acc{border:1px solid var(--line);border-radius:10px;padding:0 12px;margin-bottom:10px;background:var(--panel2)}
details.acc summary{cursor:pointer;padding:12px 0;font-weight:700;list-style:none}
details.acc summary::-webkit-details-marker{display:none}
.badge{font-size:10.5px;padding:2px 7px;border-radius:6px;font-weight:700}
.badge.done{background:#12281f;color:var(--good)}
.badge.active{background:#20263f;color:var(--accent)}
.badge.draft{background:#2a2213;color:var(--warn)}
canvas{max-width:100%}
</style>

<header class="top">
  <div class="in">
    <div class="logo">🧪 <span class="b">1週間英語ラボ</span></div>
    <div class="grow"></div>
    <button class="btn sm gho" onclick="exportAllCSV()">⬇︎ CSV</button>
    <button class="btn sm gho" onclick="openView('settings')">⚙︎</button>
  </div>
</header>

<div class="wrap" id="app"></div>

<nav class="tabs" id="tabs"></nav>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   1週間英語ラボ — 単一ファイル / ローカル保存 / スプシ&無料LLM連携
   ========================================================================= */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const uid = (p='id')=>p+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const todayStr = ()=> new Date().toISOString().slice(0,10);
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
const num = (v,d=0)=>{const n=parseFloat(v);return isNaN(n)?d:n;};

/* ---------- constants ---------- */
const CATEGORIES = ['単語','文法','リーディング','リスニング','スピーキング','ライティング','発音','TOEIC','英会話','学習習慣','その他'];
const TEST_TYPES = ['TOEIC模擬','英単語','文法','リスニング','リーディング','スピーキング','発音','ディクテーション','英作文','独自テスト'];
const PLATFORMS = ['YouTube','Instagram','TikTok','X','Web','その他'];
const LEVELS = ['初級','中級','上級','TOEIC〜500','TOEIC500-700','TOEIC700-900','TOEIC900+'];
const GOALS = ['英会話','TOEIC・試験','リスニング','スピーキング','発音','語彙','文法','ライティング','ビジネス英語','学習習慣'];
const COSTS = ['無料','〜500円','〜1,000円','〜3,000円','〜10,000円','10,000円〜'];
const RECMINS = [10,15,20,30,45,60];
const RECDAYS = [3,5,7,14,21,30];

// 入力内容から学習法の難易度を自動判定（1易〜5難）。運営者が難易度を決めなくてよい
function autoDifficulty(o){
  const cats=o.categories||[], lv=o.targetLevel||'', min=num(o.recMin,30);
  let s=2;
  const outputHits=['スピーキング','ライティング','発音','英会話'].filter(c=>cats.includes(c)).length;
  if(outputHits>=1)s+=1;                    // アウトプット系は負荷高
  if(cats.includes('文法'))s+=0.3;
  if(cats.includes('英会話'))s+=0.4;         // 相手/予約が要る
  if(/上級|900/.test(lv))s+=1.2;             // 対象レベルが高いほど難
  else if(/中級|500-700|700-900/.test(lv))s+=0.3;
  else if(/初級|〜500/.test(lv))s-=0.6;
  if(min>=60)s+=1; else if(min>=45)s+=0.6; else if(min>=30)s+=0.2; else if(min<20)s-=0.4; // 時間負荷
  return clamp(Math.round(s),1,5);
}
const DIFF_LABEL=['とても易しい','易しい','ふつう','やや難しい','難しい'];
// 難易度の5指標（AIが題名・選択肢・会話からそれぞれ採点→加重平均が総合難易度）
const DIFF_INDICATORS=[
  {k:'cognitive', label:'認知負荷',   w:30, hint:'アウトプット量・同時処理（例:シャドーイングは高い）'},
  {k:'prerequisite',label:'前提知識', w:25, hint:'必要な語彙・文法の土台'},
  {k:'habit',     label:'続けにくさ', w:20, hint:'飽きやすさ・意志力への依存'},
  {k:'barrier',   label:'準備・環境', w:15, hint:'教材・相手・予約などのハードル'},
  {k:'timeload',  label:'時間負荷',   w:10, hint:'1回の長さ×頻度'},
];
function renderDiffBreak(b){
  if(!b)return'';
  return `<div style="border-top:1px solid var(--line);padding-top:8px">
    <div class="tiny" style="margin-bottom:4px">判定の内訳（5指標の加重平均）</div>
    ${DIFF_INDICATORS.map(ind=>{
      const v=clamp(num(b[ind.k],0),0,5);
      return `<div style="display:flex;align-items:center;gap:8px;margin:3px 0">
        <div class="tiny" style="flex:0 0 72px" title="${esc(ind.hint)}">${ind.label}</div>
        <div class="bar-track" style="flex:1;height:6px"><div class="bar-fill" style="width:${v*20}%"></div></div>
        <div class="tiny" style="flex:0 0 56px">${v?'★'.repeat(v):'—'} <span class="mut">${ind.w}%</span></div></div>`;
    }).join('')}</div>`;
}
let _aiJudgedDiff=null, _aiNote='', _aiLevel=null, _aiDiffBreak=null; // AI先生の判定（難易度・コツ・レベル・指標内訳）
function refreshAutoDiff(){
  const box=$('#f_diff_disp'); if(!box)return;
  _aiJudgedDiff=null; _aiLevel=null; // 選択を変えたらAI判定はリセット（ルール判定に戻す）
  const cats=$$('#f_cats .chip.a').map(c=>c.dataset.c);
  const d=autoDifficulty({categories:cats,recMin:$('#f_recmin')?.value});
  box.innerHTML=`${diffStars(d)} <span class="tiny">（${DIFF_LABEL[d-1]}・自動）</span>`;
}
// AI先生（東大卒×脳科学コーチ）が入力内容から難易度・対象レベル・学習のコツを判定
async function aiJudgeMethod(){
  if(!activeProviders().length)return toast('AI判定にはAPIキーが必要です（⚙️設定）。今は自動ルール判定中');
  const name=$('#f_name').value.trim()||'（名称未設定）';
  const cats=$$('#f_cats .chip.a').map(c=>c.dataset.c), goals=$$('#f_goals .chip.a').map(c=>c.dataset.g);
  const recMin=$('#f_recmin').value;
  const note=$('#f_ai_note'); if(note)note.innerHTML='<span class="sub">🧠 AI先生が判定中…</span>';
  const prompt=`次の英語学習法を評価してください。
名称:${name} / カテゴリ:${cats.join(',')||'-'} / 目的:${goals.join(',')||'-'} / 1日${recMin}分
JSONオブジェクトのみで返答:
{"difficulty":1〜5の整数(5が最難), "targetLevel":"この学習法が最も合う学習者レベルを次から1つ: ${LEVELS.join(' / ')}", "difficultyReason":"難易度と対象レベルをそう判断した理由を1文", "tips":["継続と効果を高めるコツを脳科学/第二言語習得の観点で3つ、各1文"]}`;
  try{
    const o=parseLooseJSON(await callLLM(prompt,{json:true,system:AI_PERSONA}))||{};
    let d=parseInt(o.difficulty,10); if(!(d>=1&&d<=5))d=autoDifficulty({categories:cats,recMin});
    _aiJudgedDiff=d;
    _aiLevel=LEVELS.includes(o.targetLevel)?o.targetLevel:(LEVELS.find(l=>String(o.targetLevel||'').includes(l))||null);
    _aiNote=(o.difficultyReason||'')+(Array.isArray(o.tips)&&o.tips.length?'\n【コツ】\n・'+o.tips.join('\n・'):'');
    if($('#f_diff_disp'))$('#f_diff_disp').innerHTML=`${diffStars(d)} <span class="tiny">（${DIFF_LABEL[d-1]}・AI判定 by ${esc(lastLLMModel)}）</span>`;
    if($('#f_level_disp'))$('#f_level_disp').innerHTML=`対象レベル: <b class="hl">${esc(_aiLevel||'中級')}</b>（AI判定）`;
    if(note)note.innerHTML=(o.difficultyReason?`<div class="tiny" style="margin-bottom:6px">💬 ${esc(o.difficultyReason)}</div>`:'')+
      (Array.isArray(o.tips)&&o.tips.length?`<div class="ok-box"><b>🧠 学習のコツ</b><ul style="margin:6px 0 0;padding-left:18px">${o.tips.map(t=>`<li>${esc(t)}</li>`).join('')}</ul></div>`:'');
    toast('AI先生の判定完了（'+lastLLMModel+'）');
  }catch(e){ if(note)note.innerHTML=`<div class="warn-box tiny">AI判定に失敗: ${esc(e.message)}<br>自動ルール判定の値を使います。</div>`; }
}

/* ---------- APIキー未設定の案内（端末ごと保存のため、スマホでは入れ直し or 引き継ぎが必要） ---------- */
function needKeyModal(){
  modal('この端末にAPIキーがありません',`
    <div class="sub">AI機能（チャット・分析・テスト生成）には無料LLMのAPIキーが必要です。<br>
    <b>キーは端末ごとに保存</b>されるため、PCで入れていてもスマホには入っていません。</div>
    <div class="ok-box" style="margin-top:10px"><b>📲 一番ラクな方法（スマホで手打ち不要）</b><br>
    1. PCでアプリを開く → ⚙️設定 →「スマホへ引き継ぎ」の<b>コードをコピー</b><br>
    2. LINEやメモ等で自分のスマホに送る<br>
    3. この端末の ⚙️設定 →「引き継ぎコードを貼り付け」→ 取り込む</div>
    <div class="tiny" style="margin-top:8px">または、この端末の⚙️設定で直接キーを貼り付けてもOKです（Groq: console.groq.com/keys）。</div>
  `,[{t:'⚙️ 設定を開く',cls:'p',fn:()=>{closeModal();openView('settings');}}]);
}
// 設定の引き継ぎコード（APIキー・優先度・GAS URL・配点をbase64化）
// セキュリティ: コードにはAPIキーが含まれるため、原則クリップボードのみ（画面に表示しない）
async function exportTransferCode(){
  const s=DB.settings;
  const code=btoa(unescape(encodeURIComponent(JSON.stringify({llmKeys:s.llmKeys,llmPrefer:s.llmPrefer,gasUrl:s.gasUrl,weights:s.weights,ytKey:s.ytKey||''}))));
  try{
    await navigator.clipboard.writeText(code);
    toast('✅ コピーしました（画面には表示しません）。自分だけに送ってください');
  }catch(e){
    // クリップボード不可の環境のみ、警告つきで一時表示（60秒で自動消去）
    const ta=$('#tf_code');
    if(ta){
      ta.value=code; ta.style.display='block'; ta.select();
      toast('⚠️ 手動でコピーしてください。60秒後に自動で消します');
      setTimeout(()=>{ta.value='';ta.style.display='none';},60000);
    }
  }
}
function importTransferCode(){
  const raw=($('#tf_in')?.value||'').trim(); if(!raw)return toast('コードを貼り付けてください');
  try{

    if(o.ytKey)DB.settings.ytKey=o.ytKey;

}

function applyUnderstood(u){
  if(!u||typeof u!=='object')return false;
  let applied=false;
  if(u.description&&typeof u.description==='string'&&u.description!=='null'&&$('#f_desc')){$('#f_desc').value=u.description;applied=true;}
  if(u.instructions&&typeof u.instructions==='string'&&u.instructions!=='null'&&$('#f_inst')){$('#f_inst').value=u.instructions;applied=true;}
  if(applied){const det=$('#f_desc')?.closest('details'); if(det)det.setAttribute('open','');}
  return applied;
}
async function aiChatTurn(userText){
  const transcript=_aiChat.map(m=>(m.role==='ai'?'先生:':'学習者:')+m.text).join('\n');
  const prompt=`あなたは学習法の「中身」を聞き取って設定を決めるコーチです。仕事は2つ:
A) この学習法が具体的に何をするのか（やること・教材・進め方）を対話で把握し、understoodに書く
B) 把握した内容から難易度5指標・対象レベルを判定する

現在のフォーム入力:
${methodFormContext()}
${transcript?`これまでの会話:\n${transcript}\n`:''}
${userText?'学習者の最新発言を踏まえ、understood（把握した内容）と判定を更新してください。内容がまだ曖昧なら「具体的に何をするのか」を1つだけ追加質問。十分把握できたら把握内容を一言で要約して確認し、done=true。「これで決定」と言われたら即done=true。「やっぱり調整したい」はdone=falseに戻す。':'最初のターンです。名前とカテゴリから内容を推測して一言で提示し、「具体的にはどんなことをしますか？」と確認してください。判定はまだ仮でよい。quickには想定される進め方の候補を3つ（例:「動画を見て真似して話す」「教材の例文を暗唱」「アプリで問題を解く」）。'}

難易度は必ず次の5指標をそれぞれ1〜5で採点し、加重平均（認知負荷30%・前提知識25%・続けにくさ20%・準備環境15%・時間負荷10%）を四捨五入した値を difficulty とすること:
- cognitive(認知負荷): アウトプット量・同時処理の多さ（把握した内容から判断。例:即時アウトプット=高、聞き流し=低）
- prerequisite(前提知識): 必要な語彙・文法の土台
- habit(続けにくさ): 飽きやすさ・意志力依存（会話で「三日坊主」等が出たら反映）
- barrier(準備・環境): 教材・相手・予約・費用のハードル
- timeload(時間負荷): 1日の分数×日数
targetLevelはCEFR/TOEIC/英検の水準感で選ぶ。
JSONのみで返答:
{"reply":"学習者への言葉（2〜3文・話し言葉・簡潔）","understood":{"description":"把握した学習法の説明1〜2文（まだ不明ならnull）","instructions":"把握した手順を1行ずつ改行区切りで（例: 1. 動画を視聴\\n2. 音読3回。不明ならnull）"},"difficulty":1〜5の整数,"indicators":{"cognitive":N,"prerequisite":N,"habit":N,"barrier":N,"timeload":N},"targetLevel":"${LEVELS.join(' / ')} から1つ","quick":["学習者が選びそうな返答3つ（各14字以内・毎回文脈に合わせて変える）"],"done":false,"tips":["脳科学的なコツ1〜3個（任意）"]}`;
  try{
    const o=parseLooseJSON(await callLLM(prompt,{json:true,system:AI_PERSONA}))||{};
    const filled=applyUnderstood(o.understood); // 把握した概要・手順をフォームへ
    // 指標内訳（あれば加重平均でdifficultyを検算・上書き）
    if(o.indicators&&typeof o.indicators==='object'){
      const b={}; DIFF_INDICATORS.forEach(ind=>{const v=parseInt(o.indicators[ind.k],10); if(v>=1&&v<=5)b[ind.k]=v;});
      if(Object.keys(b).length>=3){
        _aiDiffBreak=b;
        const wsum=DIFF_INDICATORS.reduce((s,ind)=>s+(b[ind.k]?ind.w:0),0);
        if(wsum>0)o.difficulty=Math.round(DIFF_INDICATORS.reduce((s,ind)=>s+(b[ind.k]||0)*ind.w,0)/wsum);
        if($('#f_diff_break'))$('#f_diff_break').innerHTML=renderDiffBreak(b);
      }
    }
    let d=parseInt(o.difficulty,10);
    if(d>=1&&d<=5){_aiJudgedDiff=d; if($('#f_diff_disp'))$('#f_diff_disp').innerHTML=`${diffStars(d)} <span class="tiny">（${DIFF_LABEL[d-1]}・AI判定）</span>`;}
    const lv=LEVELS.includes(o.targetLevel)?o.targetLevel:(LEVELS.find(l=>String(o.targetLevel||'').includes(l))||null);
    if(lv){_aiLevel=lv; if($('#f_level_disp'))$('#f_level_disp').innerHTML=`対象レベル: <b class="hl">${esc(lv)}</b>（AI判定）`;}
    if(Array.isArray(o.tips)&&o.tips.length)_aiNote='AI先生と相談して判定\n【コツ】\n・'+o.tips.join('\n・');
    _aiQuick=Array.isArray(o.quick)?o.quick.filter(x=>typeof x==='string'&&x.trim()).slice(0,3):[];
    _aiDone=o.done===true||/これで決定/.test(userText||'');
    _aiChat.push({role:'ai',text:o.reply||'（判定を更新しました）'});
  }catch(e){
    _aiChat.push({role:'ai',text:'すみません、通信に失敗しました（'+e.message.slice(0,40)+'）。もう一度送ってください。'});
  }
  aiChatRender();
}

/* ---------- 発信者から学習法をAI自動抽出（手入力不要） ----------
   情報源の優先順: ①YouTube Data API(キー任意・実データ) ②無料リーダーでチャンネルページ ③AIの既存知識 */
async function fetchYTContext(inf){
  const s=DB.settings;
  // ① YouTube Data API v3（無料枠。チャンネル紹介＋再生リスト＝学習法シリーズ＋人気動画のフル説明文を取得）
  try{
    if(s.ytKey&&inf.youtube){
      const key=encodeURIComponent(s.ytKey);
      const yt=(path)=>fetch(`https://www.googleapis.com/youtube/v3/${path}&key=${key}`).then(r=>r.json());
      let chId='', about='';
      const cu=inf.youtube.match(/channel\/(UC[\w\-]+)/), m=inf.youtube.match(/@([\w.\-]+)/);
      if(cu){ // channel/UC... 形式
        const j=await yt(`channels?part=snippet&id=${cu[1]}`);
        if(j.items?.[0]){chId=cu[1]; about=j.items[0].snippet?.description||'';}
      } else if(m){ // @ハンドル形式
        const j=await yt(`channels?part=snippet&forHandle=${encodeURIComponent(m[1])}`);
        chId=j.items?.[0]?.id||''; about=j.items?.[0]?.snippet?.description||'';
      }
      if(chId){
        const parts=[]; let vidCount=0;
        if(about)parts.push('【チャンネル紹介文】\n'+about.slice(0,700));
        // 再生リスト（＝発信者が体系化した学習法シリーズ。最重要シグナル）
        try{
          const jp=await yt(`playlists?part=snippet&channelId=${chId}&maxResults=25`);
          const pls=(jp.items||[]).map(it=>'- '+it.snippet.title+(it.snippet.description?('：'+it.snippet.description.slice(0,70)):'')).filter(Boolean);
          if(pls.length)parts.push('【再生リスト（学習法シリーズ）】\n'+pls.join('\n'));
        }catch(e){}
        // 人気動画→動画IDでフル説明文を取得（searchのsnippetは説明が切れているためvideos.listで補完）
        const js=await yt(`search?part=snippet&channelId=${chId}&order=viewCount&type=video&maxResults=12`);
        const ids=(js.items||[]).map(it=>it.id?.videoId).filter(Boolean);
        if(ids.length){
          const jv=await yt(`videos?part=snippet,statistics&id=${ids.join(',')}`);
          const vids=(jv.items||[]).map(v=>{
            const vc=v.statistics?.viewCount?Math.round(v.statistics.viewCount/10000)+'万回 ':'';
            const desc=(v.snippet.description||'').slice(0,220).replace(/\n+/g,' ');
            return `- 【${vc}】${v.snippet.title}${desc?'\n  '+desc:''}`;
          });
          vidCount=vids.length;
          if(vids.length)parts.push('【人気動画（タイトル＋説明冒頭）】\n'+vids.join('\n'));
        }
        const text=parts.join('\n\n').slice(0,6500);
        if(text)return {src:`YouTube API（紹介文＋再生リスト＋人気動画${vidCount}本）`,text};
      }
    }
  }catch(e){}
  // ② 無料リーダー（キー不要・ベストエフォート。失敗したら黙って次へ）
  try{
    if(inf.youtube){
      const ctl=new AbortController(); setTimeout(()=>ctl.abort(),9000);
      const r=await fetch('https://r.jina.ai/'+inf.youtube.replace(/\/$/,'')+'/videos',{signal:ctl.signal});
      if(r.ok){const t=await r.text(); if(t&&t.length>300)return {src:'チャンネルページ（簡易取得）',text:t.slice(0,4000)};}
    }
  }catch(e){}
  return {src:'AIの既存知識',text:''};
}

  const inf=infById(infId); if(!inf)return;
  if(!activeProviders().length)return needKeyModal();
  modalRaw(`<div class="modal" style="max-width:420px"><h2 style="margin:0">🔎 抽出中…</h2>
    <div class="sub" id="ex_status" style="margin-top:10px">📡 ${esc(inf.name)}の情報を取得しています…</div></div>`);
  const ctx=await fetchYTContext(inf);
  if($('#ex_status'))$('#ex_status').textContent='🧠 AIが学習法を構造化しています…（情報源: '+ctx.src+'）';

// YouTubeチャンネルを名前/URL/@ハンドルから解決（キーがある時のみ・失敗はnull）
async function resolveYTChannel(query){
  const s=DB.settings; if(!s.ytKey)return null;
  const key=encodeURIComponent(s.ytKey);
  const yt=p=>fetch(`https://www.googleapis.com/youtube/v3/${p}&key=${key}`).then(r=>r.json());
  let item=null;
  const hm=query.match(/@([\w.\-]+)/);
  const handle=hm?hm[1]:(/^[\w.\-]+$/.test(query)&&!query.includes(' ')?query.replace(/^@/,''):'');
  try{ if(handle){const j=await yt(`channels?part=snippet&forHandle=${encodeURIComponent(handle)}`); item=j.items?.[0];} }catch(e){}
  try{ if(!item){const cm=query.match(/channel\/(UC[\w\-]+)/); if(cm){const j=await yt(`channels?part=snippet&id=${cm[1]}`); item=j.items?.[0];}} }catch(e){}
  try{ if(!item){const j=await yt(`search?part=snippet&type=channel&q=${encodeURIComponent(query.replace(/https?:\S+/,''))||encodeURIComponent(query)}&maxResults=1`);
    const c=j.items?.[0]; const cid=c?.id?.channelId; if(cid){const j2=await yt(`channels?part=snippet&id=${cid}`); item=j2.items?.[0];}} }catch(e){}
  if(!item)return null;
  const sn=item.snippet||{};
  const cu=sn.customUrl?('https://www.youtube.com/'+(sn.customUrl.startsWith('@')?sn.customUrl:'@'+sn.customUrl)):('https://www.youtube.com/channel/'+item.id);
  return {name:sn.title||query, youtube:cu, note:(sn.description||'').slice(0,200)};
}

async function extractFromNewInput(){
  const q=($('#ex_new_q')?.value||'').trim(); if(!q)return toast('名前かURLを入力してください');
  if(!activeProviders().length){closeModal();return needKeyModal();}
  closeModal();
  modalRaw(`<div class="modal" style="max-width:420px"><h2 style="margin:0">🔎 発信者を確認中…</h2>
    <div class="sub" id="ex_status" style="margin-top:10px">📡 「${esc(q)}」を探しています…</div></div>`);
  let resolved=null;
  if(DB.settings.ytKey){ try{ resolved=await resolveYTChannel(q); }catch(e){} }
  // 既存と同名なら再利用、なければ新規登録
  const isUrl=/https?:|youtube|@/i.test(q);
  const name=resolved?resolved.name:(isUrl?(q.match(/@([\w.\-]+)/)?.[1]||'新規発信者'):q);
  let inf=DB.influencers.find(x=>x.name===name);
  if(!inf){
    inf={id:uid('inf'),name,platform:'YouTube',youtube:resolved?resolved.youtube:(isUrl?q:''),
      instagram:'',tiktok:'',x:'',website:'',theme:'',target:'',note:resolved?resolved.note:''};
    DB.influencers.push(inf); saveNow();
  } else if(resolved && !inf.youtube){ inf.youtube=resolved.youtube; saveNow(); }
  closeModal();
  extractMethods(inf.id);
}

// 英語読み上げ（無料・オフライン・ブラウザ内蔵TTS）
// ※「最初に見つかった声」を使うとMacのふざけたノベルティ音声(Albert等)に当たるため、品質スコアで最良の声を選ぶ
let _enVoice=null;
function pickENVoice(){
  const vs=(speechSynthesis.getVoices&&speechSynthesis.getVoices())||[];
  if(!vs.length)return null;
  const score=v=>{
    const n=(v.name||'')+' '+(v.voiceURI||'');
    if(!/^en/i.test(v.lang))return -1;
    let s=0;
    if(/en[-_]US/i.test(v.lang))s+=30; else if(/en[-_](GB|AU|CA)/i.test(v.lang))s+=15;
    if(/Samantha/i.test(n))s+=50;                                   // macOSの標準高品質
    if(/\b(Ava|Allison|Susan|Zoe|Evan|Nathan|Noelle|Joelle)\b/i.test(n))s+=45; // Apple高品質系
    if(/Google/i.test(n))s+=40;                                     // Chromeの高品質
    if(/Natural|Neural|Online|Premium|Enhanced|拡張/i.test(n))s+=35; // Edge/拡張品質
    if(/compact/i.test(n))s-=40;                                    // 低品質
    if(/Albert|Bad News|Bahh|Bells|Boing|Bubbles|Cellos|Wobble|Fred|Junior|Kathy|Organ|Superstar|Trinoids|Whisper|Zarvox|Jester|Ralph|Grandma|Grandpa|Rocko|Shelley|Eddy|Flo|Reed|Sandy/i.test(n))s-=100; // ノベルティ声を除外
    return s;
  };
  const ranked=vs.map(v=>[score(v),v]).filter(x=>x[0]>=0).sort((a,b)=>b[0]-a[0]);
  return ranked.length?ranked[0][1]:null;
}

function speakEN(text,rate){
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=rate||0.9; u.pitch=1; u.volume=1;
    if(!_enVoice)_enVoice=pickENVoice();

    speechSynthesis.speak(u);

}

/* =========================================================================
   スコア計算エンジン
   ========================================================================= */
function computeStats(ch){
  const pre=preTest(ch.id), post=postTest(ch.id), rev=reviewOf(ch.id);
  const logs=logsOf(ch.id);
  const doneLogs = logs.filter(l=>l.status==='完了'||l.status==='一部実施');
  const totalMin = logs.reduce((s,l)=>s+num(l.minutes),0);
  const totalHr = totalMin/60;
  const daysPracticed = doneLogs.length;
  const retentionPct = Math.round((daysPracticed/7)*100);
  // test diffs
  let rateDiff=null, scoreDiff=null, correctDiff=null, timeDiff=null;
  if(pre&&post){
    if(pre.rate!=null&&post.rate!=null) rateDiff = round1(post.rate-pre.rate);
    if(pre.score!=null&&post.score!=null) scoreDiff = round1(post.score-pre.score);
    if(pre.correct!=null&&post.correct!=null) correctDiff = post.correct-pre.correct;
    if(pre.seconds!=null&&post.seconds!=null) timeDiff = post.seconds-pre.seconds;
  }
  // 100点換算の各サブスコア
  const s = {};
  // test改善: 正答率diff優先(+20pt→100)、無ければscore diff(+50→100)
  if(rateDiff!=null) s.test = clamp(50 + rateDiff*2.5, 0, 100);      // 0pt→50, +20→100, -20→0
  else if(scoreDiff!=null) s.test = clamp(50 + scoreDiff, 0, 100);
  else s.test = null;
  s.retention = clamp(retentionPct,0,100);
  // 時間効率: 改善/時間。rateDiff/hr, 5pt/h→100。無ければreview
  if(rateDiff!=null && totalHr>0) s.efficiency = clamp(50 + (rateDiff/totalHr)*10, 0, 100);
  else if(rev&&rev.time_efficiency) s.efficiency = rev.time_efficiency*20;
  else s.efficiency = null;
  const rv = k => rev&&rev[k]?rev[k]*20:null; // 5段階→100
  s.effect = rev? clamp(num(rev.effectiveness)*20,0,100):null;
  s.sustain = rev? clamp(num(rev.sustainability)*20,0,100): (logs.length?clamp(avg(logs.map(l=>num(l.sustain)))*20,0,100):null);
  s.fun = rev? clamp(num(rev.enjoyment)*20,0,100): (logs.length?clamp(avg(logs.map(l=>num(l.fun)))*20,0,100):null);
  s.cost = rev? clamp(num(rev.cost_performance)*20,0,100):null;
  s.continue = rev? clamp(num(rev.continuation)*20,0,100):null;
  // 総合スコア（欠損項目は配点を除外して正規化）
  const W=DB.settings.weights;
  let acc=0,wsum=0;
  for(const k in W){ if(s[k]!=null){acc += s[k]*(W[k]/100); wsum += W[k];} }
  const total = wsum>0? round1(acc*(100/wsum)) : null;
  return {pre,post,rev,logs,totalMin,totalHr,daysPracticed,retentionPct,
    rateDiff,scoreDiff,correctDiff,timeDiff,sub:s,total,
    perHrImprove: (rateDiff!=null&&totalHr>0)? round1(rateDiff/totalHr):null,
    sameProblem: pre&&post&&pre.material&&post.material&&pre.material===post.material&&!pre.auto&&!post.auto};
}
/* 良い/悪い自動判定（ルールベース・API不要） */
function verdict(st){
  if(st.total==null)return null;
  const t=st.total, rd=st.rateDiff, ret=st.retentionPct;
  let tier,emoji,color,head;
  if(t>=78 && (rd==null||rd>=0)){tier='とても良い（おすすめ）';emoji='◎';color='var(--good)';}
  else if(t>=63 && (rd==null||rd>=0)){tier='良い';emoji='○';color='var(--accent)';}
  else if(t>=48){tier='ふつう';emoji='△';color='var(--warn)';}
  else {tier='相性いまひとつ';emoji='✕';color='var(--bad)';}
  head=`この学習法は「${tier}」`;
  const reasons=[];
  if(rd!=null)reasons.push(rd>0?`正答率が+${rd}pt伸びた`:rd<0?`正答率が${rd}pt下がった`:'正答率は横ばい');
  reasons.push(ret>=85?`継続率が高い(${ret}%)`:ret>=60?`継続率まずまず(${ret}%)`:`継続が続かなかった(${ret}%)`);
  if(st.perHrImprove!=null)reasons.push(st.perHrImprove>0?`時間効率が良い(1hで+${st.perHrImprove}pt)`:'時間のわりに伸びが小さい');
  // ひとことアドバイス
  let advice='';
  if(t>=78)advice='今後も続ける価値が高い方法です。';
  else if(rd!=null&&rd<0)advice='テストが下がっているため、教材やテスト条件を見直すとより正確に評価できます。';
  else if(ret<60)advice='効果より先に「続けやすさ」が課題。時間や頻度を下げて再挑戦すると良いかも。';
  else advice='悪くはないが、他の方法と比較して相性を見極めましょう。';
  return {tier,emoji,color,head,reasons,advice};
}
const round1 = n => Math.round(n*10)/10;
const avg = a => a.length? a.reduce((x,y)=>x+num(y),0)/a.length : 0;

}

/* 発信者の実証評価：その発信者の学習法を実践した「実際の結果」で採点 */
function influencerStats(){
  const scored=scoredChallenges();
  return DB.influencers.map(inf=>{
    const results=scored.filter(x=>x.m&&x.m.influencerId===inf.id);
    if(!results.length)return {inf,n:0,avg:null,avgDiff:null,avgRet:null,grade:gradeOf(null,0)};
    const avg=round1(avg_(results.map(x=>x.st.total)));
    const diffs=results.map(x=>x.st.rateDiff).filter(v=>v!=null);
    const avgDiff=diffs.length?round1(avg_(diffs)):null;
    const avgRet=Math.round(avg_(results.map(x=>x.st.retentionPct)));
    return {inf,n:results.length,avg,avgDiff,avgRet,grade:gradeOf(avg,results.length)};
  }).sort((a,b)=>(b.avg??-1)-(a.avg??-1));
}
const avg_=a=>a.reduce((x,y)=>x+y,0)/a.length;
function gradeOf(avg,n){
  if(!n||avg==null)return {g:'—',label:'未検証（データなし）',color:'var(--sub)',bg:'transparent'};
  if(avg>=78)return {g:'S',label:'◎ 効果実証済み',color:'#062020',bg:'linear-gradient(135deg,#4dd0c3,#39b3a7)'};
  if(avg>=63)return {g:'A',label:'○ 良い',color:'var(--good)',bg:'#12281f'};
  if(avg>=48)return {g:'B',label:'△ ふつう',color:'var(--warn)',bg:'#2a2213'};
  return {g:'C',label:'✕ 効果が出ていない',color:'var(--bad)',bg:'#331b21'};
}

    </div>
    <div class="right"><div class="hl" style="font-size:22px;font-weight:800">${x.st.total}</div><div class="tiny">点</div></div>
  </div>`;

function calcStreak(){
  const days=new Set(DB.logs.filter(l=>l.status==='完了'||l.status==='一部実施').map(l=>l.date));
  let s=0,d=new Date();
  for(;;){const k=d.toISOString().slice(0,10);
    if(days.has(k)){s++;d.setDate(d.getDate()-1);}
    else if(k===todayStr()){d.setDate(d.getDate()-1);} // today not yet logged still ok to continue
    else break;
    if(s>400)break;}
  return s;
}

function diffCls(d){return d==null?'':d>0?'':d<0?'':'';}
function fmtDiff(d,u=''){if(d==null)return'—';return (d>0?'+':'')+round1(d)+u;}
// 分野別の伸び（pre/post両方にfieldStatsがあるとき）＝「どの力が伸びたか」を明示
function fieldDiffTable(pre,post){
  if(!pre?.fieldStats||!post?.fieldStats)return'';
  const fields=[...new Set([...Object.keys(pre.fieldStats),...Object.keys(post.fieldStats)])];
  if(!fields.length)return'';
  const pct=(fs,f)=>fs[f]&&fs[f].total?round1(fs[f].correct/fs[f].total*100):null;
  const rows=fields.map(f=>{
    const a=pct(pre.fieldStats,f), b=pct(post.fieldStats,f);
    const d=(a!=null&&b!=null)?round1(b-a):null;
    const col=d==null?'var(--sub)':d>0?'var(--good)':d<0?'var(--bad)':'var(--warn)';
    const mark=d==null?'—':d>0?'📈':d<0?'📉':'→';
    return `<tr><td>${esc(f)}</td><td>${a!=null?a+'%':'—'}</td><td>${b!=null?b+'%':'—'}</td>
      <td style="color:${col};font-weight:800">${mark} ${d!=null?fmtDiff(d,'pt'):''}</td></tr>`;}).join('');
  // ひとこと要約（最も伸びた/落ちた分野）
  const diffs=fields.map(f=>({f,d:(pct(pre.fieldStats,f)!=null&&pct(post.fieldStats,f)!=null)?pct(post.fieldStats,f)-pct(pre.fieldStats,f):null})).filter(x=>x.d!=null);
  let summary='';
  if(diffs.length){
    const up=diffs.slice().sort((x,y)=>y.d-x.d)[0], down=diffs.slice().sort((x,y)=>x.d-y.d)[0];
    summary=`<div class="tiny" style="margin-top:6px">`+
      (up.d>0?`最も伸びたのは<b class="hl">${esc(up.f)}（+${round1(up.d)}pt）</b>。`:'伸びた分野はありませんでした。')+
      (down.d<0?` <span style="color:var(--bad)">${esc(down.f)}は${round1(down.d)}pt低下</span>。`:'')+`</div>`;
  }
  return `<div style="margin-top:12px"><div class="tiny" style="font-weight:700;margin-bottom:4px">分野別の伸び（この学習法がどの力に効いたか）</div>
    <div class="scroll-x"><table><tr><th>分野</th><th>実践前</th><th>実践後</th><th>変化</th></tr>${rows}</table></div>${summary}</div>`;
}

// 層化抽出：分野→レベル(1易/2中/3難)を均等に混ぜ、前回出題分を除外して抽出
function pickQuestions(count,diff,fields,exclude){
  fields=fields&&fields.length?fields:TEST_FIELDS.slice();
  exclude=exclude||new Set();
  const fresh=q=>!exclude.has(qKey(q));
  let pool=QUESTION_BANK.filter(q=>fields.includes(q.c)&&(diff==='all'||q.level===num(diff))&&fresh(q));
  if(pool.length<count)pool=QUESTION_BANK.filter(q=>fields.includes(q.c)&&fresh(q)); // レベル条件をゆるめる
  let reused=false;
  if(pool.length<count && exclude.size){ // 未出題だけでは足りない→既出も許可（結果に警告を残す）
    pool=QUESTION_BANK.filter(q=>fields.includes(q.c)); reused=true;
  }
  if(pool.length<Math.min(count,5))pool=QUESTION_BANK.slice();
  // 層化: 分野ごと→レベル1,2,3の順で交互に取り出し（構成が毎回そろう）
  const byField={};
  pool.forEach(q=>{(byField[q.c]=byField[q.c]||{1:[],2:[],3:[]})[q.level||2].push(q);});
  Object.values(byField).forEach(lv=>Object.values(lv).forEach(a=>a.sort(()=>Math.random()-0.5)));
  const fieldKeys=Object.keys(byField);
  const seqs={};
  fieldKeys.forEach(f=>{const lv=byField[f],seq=[];let li=0;
    while(lv[1].length||lv[2].length||lv[3].length){const l=[1,2,3][li%3];li++;if(lv[l].length)seq.push(lv[l].shift());}
    seqs[f]=seq;});
  const picked=[];let fi=0,guard=0;
  while(picked.length<count&&guard++<500){
    const f=fieldKeys[fi%fieldKeys.length];fi++;
    if(seqs[f]&&seqs[f].length)picked.push(seqs[f].shift());
    if(fieldKeys.every(k=>!seqs[k].length))break;
  }
  const res=picked.slice(0,count).map(q=>{
    const opts=q.ch.map((t,i)=>[t,i===q.a]).map(o=>[Math.random(),o]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
    return {c:q.c,q:q.q,audio:q.audio||null,level:q.level||2,ch:opts.map(o=>o[0]),a:opts.findIndex(o=>o[1])};
  });
  res._reused=reused;
  return res;
}
async function genAITest(count,diff,fields,method,exclude){
  // 難易度アンカー：CEFR/TOEIC/英検の水準に紐付けて生成させる（レベルのブレを抑える）
  const lvMap={all:'CEFR A2〜B2を1:2:1で混合（TOEIC450〜800相当）','1':'CEFR A2（TOEIC400〜450・英検3級）レベルで統一','2':'CEFR B1（TOEIC550〜650・英検2級）レベルで統一','3':'CEFR B2（TOEIC750〜850・英検準1級）レベルで統一'};
  fields=fields&&fields.length?fields:TEST_FIELDS.slice();
  const hasListening=fields.includes('リスニング');
  const banned=exclude&&exclude.size?[...exclude].slice(0,30).map(k=>k.split('|')[0]||k.split('|')[1]).filter(Boolean):[];
  const prompt=`英語力の変化を正確に測定するためのテストを${count}問、試験作成の専門家として作成してください。
難易度基準: ${lvMap[diff]}。この基準から外れる問題を混ぜないこと（前後比較の等質性が最重要）。
${method?`このテストは学習法「${method.name}」（カテゴリ: ${(method.categories||[]).join('・')}）の効果測定用です。この学習法で鍛えられる能力を直接測る問題にしてください。`:''}
出題分野は「${fields.join('・')}」のみ。分野ごとの問題数はできるだけ均等に。各問4択。
${banned.length?`\n【出題禁止】以下と同じ・類似の問題は禁止（実践前テストで出題済み。同じ知識点も避ける）:\n${banned.map(b=>'- '+b).join('\n')}\n`:''}

測定に耐える問題の条件（厳守）:
- 誤答肢は「明らかに変」ではなく、学習者が実際に間違えやすいもの（品詞違い・時制違い・意味の近い語・音の似た語）にする
- 知識を問う: 文法は文脈中の空所補充、語彙は文中での使われ方、読解は推論を要する内容一致
- 単なる和訳当てクイズは禁止。実際の使用場面を想定した文で出題する
- 同じ知識点を問う問題を重複させない
${hasListening?'- リスニングは "audio" に自然な口語英文(1〜2文、TOEIC Part2-3風)を入れ、"q" には英文を含めない日本語の設問。設問は「詳細」「意図」「次の行動」など多様に':''}
出力は次の形の JSON オブジェクトのみ（説明文・コードフェンスは書かない）:
{"questions":[{"c":"分野名","q":"設問（日本語可）","audio":"リスニングの場合のみ英文、他はnull","ch":["A","B","C","D"],"a":0}]}
"a" は正解の0始まりインデックス（0〜3の整数）。正解の位置は偏らせずランダムに配置。`;
  const txt=await callLLM(prompt,{json:true,system:AI_PERSONA});
  const obj=parseLooseJSON(txt);
  const arr=Array.isArray(obj)?obj:(obj&&(obj.questions||obj.items||obj.data))||[];
  const clean=[];
  for(const q of arr){
    if(!q)continue;
    const ch=q.ch||q.choices||q.options||q.answers;
    let a=q.a; if(a==null)a=q.answer!=null?q.answer:q.correct;
    if(typeof a==='string')a=parseInt(a,10);
    const text=q.q||q.question||q.prompt;
    if(!Array.isArray(ch)||ch.length<2||!Number.isInteger(a)||!text)continue;
    const audio=(typeof q.audio==='string'&&q.audio.trim()&&q.audio!=='null')?q.audio.trim():null;
    if(exclude&&exclude.has(qKey({q:String(text),audio})))continue; // 既出は捨てる
    clean.push({c:q.c||q.category||q.type||'問',q:String(text),audio,level:num(diff==='all'?2:diff,2),ch:ch.map(String),a:clamp(a,0,ch.length-1)});
    if(clean.length>=count)break;
  }
  if(!clean.length)throw new Error('AIの返答をテスト形式に変換できませんでした（内蔵問題に切替）');
  return clean;
}
function parseLooseJSON(txt){
  let t=String(txt||'').replace(/```json/gi,'').replace(/```/g,'').trim();
  try{return JSON.parse(t);}catch(_){}
  const o=t.slice(t.indexOf('{'),t.lastIndexOf('}')+1); // オブジェクト抽出
  try{return JSON.parse(o);}catch(_){}
  const a=t.slice(t.indexOf('['),t.lastIndexOf(']')+1); // 配列抽出
  try{return JSON.parse(a);}catch(_){}
  return null;
}
function beginQuiz(cid,timing,questions,fields){

  closeModal(); // 設定モーダルを閉じてから出題

function submitQuiz(){
  if(!quizState)return;
  const {cid,timing,questions,fields,reused,start}=quizState;
  const answers=questions.map((q,i)=>{const sel=document.querySelector('input[name="q'+i+'"]:checked');return sel?+sel.value:-1;});
  if(answers.some(a=>a<0) && !confirm('未回答の問題があります。このまま採点しますか？（未回答は不正解扱い）'))return;
  speechSynthesis.cancel();
  const correct=questions.filter((q,i)=>answers[i]===q.a).length;
  const qcount=questions.length, rate=round1(correct/qcount*100);
  const seconds=Math.round((Date.now()-start)/1000);
  const fieldsLabel=(fields&&fields.length&&fields.length<TEST_FIELDS.length)?fields.join('・'):'総合';
  // 分野別成績（前後比較で「どの力が伸びたか」を分析するための核データ）
  const fieldStats={};
  questions.forEach((q,i)=>{const f=q.c||'その他';
    fieldStats[f]=fieldStats[f]||{correct:0,total:0};
    fieldStats[f].total++; if(answers[i]===q.a)fieldStats[f].correct++;});
  // 保存（既存があれば置換）
  let t=testsOf(cid).find(x=>x.timing===timing); const isNew=!t;
  if(!t)t={id:uid('t'),challengeId:cid,timing};
  Object.assign(t,{type:'アプリ自動テスト（'+fieldsLabel+'）',material:'内蔵テスト('+fieldsLabel+')',name:'内蔵テスト('+fieldsLabel+')',qcount,correct,rate,score:null,seconds,auto:true,fieldStats,
    qTexts:questions.map(qKey), fieldsArr:fields&&fields.length?fields.slice():[], reused:!!reused,
    memo:`自動採点 ${correct}/${qcount}正解（分野: ${fieldsLabel}）${reused?'※問題数不足のため一部既出問題を再出題':''}`});
  if(isNew)DB.tests.push(t);
  saveNow();
  // 結果画面（未回答は赤で明示）
  const review=questions.map((q,i)=>{const ok=answers[i]===q.a, blank=answers[i]<0;
    return `<div style="border-bottom:1px solid var(--line);padding:8px 0">
      <div class="tiny">${ok?'<span style="color:var(--good)">✓ 正解</span>':blank?'<span style="color:var(--bad);font-weight:800">⚠ 未回答</span>':'<span style="color:var(--bad)">✗ 不正解</span>'} Q${i+1}. ${esc(q.q)}</div>
      ${q.audio?`<div class="tiny mut">🔊 読み上げ英文: ${esc(q.audio)}</div>`:''}
      ${ok?'':`<div class="tiny">正解: <b class="hl">${esc(q.ch[q.a])}</b>${blank?' ／ <span style="color:var(--bad)">あなた: 未回答</span>':' ／ あなた: '+esc(q.ch[answers[i]])}</div>`}</div>`;}).join('');
  quizState=null;closeModal();
  // 分野別内訳
  const fsRows=Object.entries(fieldStats).map(([f,s])=>{
    const p=round1(s.correct/s.total*100);
    return `<div style="display:flex;align-items:center;gap:8px;margin:5px 0">
      <div class="tiny" style="flex:0 0 72px">${esc(f)}</div>
      <div class="bar-track" style="flex:1"><div class="bar-fill" style="width:${p}%"></div></div>
      <div class="tiny" style="flex:0 0 76px;font-weight:700;color:var(--txt)">${s.correct}/${s.total} (${p}%)</div></div>`;}).join('');
  modalRaw(`<div class="modal">
    <div class="center" style="margin-bottom:6px">
      <div class="score-big hl">${rate}<span style="font-size:20px">%</span></div>
      <div class="tiny">${correct} / ${qcount} 正解 ・ 所要 ${fmtSec(seconds)} ・ ${timing==='pre'?'実践前':'実践後'}テストに保存しました</div></div>
    ${reused?'<div class="warn-box" style="margin:8px 0">⚠️ 問題バンクの残りが足りず、一部に実践前と同じ問題が含まれます（スコアがやや高めに出る可能性）。「AIで生成」を使うと完全に新しい問題で受けられます。</div>':''}
    <div class="card" style="padding:12px;margin:10px 0"><div class="tiny" style="margin-bottom:4px;font-weight:700">分野別の成績</div>${fsRows}</div>
    <details class="acc"><summary class="sub">解答を確認</summary><div style="padding-bottom:10px">${review}</div></details>
    <button class="btn p" style="width:100%;margin-top:10px" onclick="closeModal();openView('challenge','${cid}')">結果を見る →</button>
  </div>`);
}

const starN = n => n?('★'.repeat(n)+'☆'.repeat(5-n)):'—';
// 比較の深掘り解析：各メソッドの「何が良くて何が悪いか」を次元別に判定
function autoCompareComment(sel){
  if(sel.length<2)return'';
  const nm=x=>x?.m?x.m.name:x?.ch.name;
  const DIMS=[
    {k:'テストの伸び', v:x=>x.st.rateDiff, fmt:v=>fmtDiff(v,'pt'), good:v=>v>0, bad:v=>v<=0},
    {k:'継続率', v:x=>x.st.retentionPct, fmt:v=>v+'%', good:v=>v>=85, bad:v=>v<60},
    {k:'時間効率', v:x=>x.st.perHrImprove, fmt:v=>fmtDiff(v,'pt/h'), good:v=>v>0, bad:v=>v<=0},
    {k:'楽しさ', v:x=>x.st.rev?.enjoyment, fmt:v=>starN(v), good:v=>v>=4, bad:v=>v<=2},
    {k:'続けやすさ', v:x=>x.st.rev?.sustainability, fmt:v=>starN(v), good:v=>v>=4, bad:v=>v<=2},
    {k:'費用対効果', v:x=>x.st.rev?.cost_performance, fmt:v=>starN(v), good:v=>v>=4, bad:v=>v<=2},
  ];
  // 各メソッドの強み・弱み（選択中での相対1位/最下位＋絶対値の良し悪し）
  const cards=sel.map(x=>{
    const vd=verdict(x.st);
    const strengths=[],weaknesses=[];
    DIMS.forEach(d=>{
      const mine=d.v(x); if(mine==null)return;
      const vals=sel.map(s=>d.v(s)).filter(v=>v!=null);
      if(vals.length<2)return;
      const isBest=mine===Math.max(...vals), isWorst=mine===Math.min(...vals);
      if(isBest&&d.good(mine))strengths.push(`${d.k} ${d.fmt(mine)}（選択中1位）`);
      else if(isWorst&&d.bad(mine))weaknesses.push(`${d.k} ${d.fmt(mine)}（選択中最下位）`);
      else if(d.bad(mine))weaknesses.push(`${d.k} ${d.fmt(mine)}`);
    });
    // 分野別の伸び（あれば）
    const pre=preTest(x.ch.id),post=postTest(x.ch.id);
    if(pre?.fieldStats&&post?.fieldStats){
      const pct=(fs,f)=>fs[f]&&fs[f].total?fs[f].correct/fs[f].total*100:null;
      const fd=[...new Set([...Object.keys(pre.fieldStats),...Object.keys(post.fieldStats)])]
        .map(f=>({f,d:(pct(pre.fieldStats,f)!=null&&pct(post.fieldStats,f)!=null)?pct(post.fieldStats,f)-pct(pre.fieldStats,f):null}))
        .filter(o=>o.d!=null).sort((a,b)=>b.d-a.d);
      if(fd.length&&fd[0].d>0)strengths.push(`${fd[0].f}が特に伸びた（+${round1(fd[0].d)}pt）`);
      if(fd.length&&fd[fd.length-1].d<0)weaknesses.push(`${fd[fd.length-1].f}は低下（${round1(fd[fd.length-1].d)}pt）`);
    }
    return `<div style="border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:8px;border-left:4px solid ${vd?vd.color:'var(--line)'}">
      <div style="font-weight:700">${vd?`<span style="color:${vd.color}">${vd.emoji}</span> `:''}${esc(nm(x))} <span class="tiny">${x.st.total}点${vd?'・'+vd.tier:''}</span></div>
      ${strengths.length?`<div class="tiny" style="margin-top:4px;color:var(--good)">✅ 良い: ${strengths.map(esc).join(' ／ ')}</div>`:''}
      ${weaknesses.length?`<div class="tiny" style="margin-top:2px;color:var(--bad)">⚠️ 課題: ${weaknesses.map(esc).join(' ／ ')}</div>`:''}
      ${!strengths.length&&!weaknesses.length?`<div class="tiny mut" style="margin-top:4px">突出した強み・弱みなし（平均的）</div>`:''}
    </div>`;
  }).join('');
  // 目的別の結論
  const by=(f)=>sel.slice().sort((a,b)=>(f(b)??-99)-(f(a)??-99))[0];
  const top=by(x=>x.st.total), bestScore=by(x=>x.st.rateDiff), bestSus=by(x=>(x.st.retentionPct??0)+(x.st.rev?.sustainability??0)*10);
  const concl=`<div class="ok-box" style="margin-top:4px"><b>🎯 結論（目的別）</b><br>
    ・スコアを上げたい → <b>${esc(nm(bestScore))}</b>${bestScore.st.rateDiff!=null?'（'+fmtDiff(bestScore.st.rateDiff,'pt')+'）':''}<br>
    ・挫折せず続けたい → <b>${esc(nm(bestSus))}</b>（継続${bestSus.st.retentionPct}%）<br>
    ・総合で選ぶなら → <b class="hl">${esc(nm(top))}</b>（${top.st.total}点）</div>`;
  return `<div class="card"><h3>💡 何が良くて、何が悪かったか</h3>${cards}${concl}</div>`;
}

function drawShare(){
  const cid=shareCid,ch=chById(cid),m=methodById(ch.methodId),inf=m?infById(m.influencerId):null,st=computeStats(ch);
  const [w,h]=SHARE_SIZES[shareSize];
  const cv=$('#s_canvas');cv.width=w;cv.height=h;
  const g=cv.getContext('2d');
  // bg gradient
  const grad=g.createLinearGradient(0,0,w,h);grad.addColorStop(0,'#141b2e');grad.addColorStop(1,'#0c1a2c');
  g.fillStyle=grad;g.fillRect(0,0,w,h);
  // accent bar
  const ag=g.createLinearGradient(0,0,w,0);ag.addColorStop(0,'#4dd0c3');ag.addColorStop(1,'#ff8a4c');
  g.fillStyle=ag;g.fillRect(0,0,w,h*0.014);
  // 縦方向カーソル方式（重なり防止・全サイズ対応）。U=高さを基準にリズムを作る
  const cx=w/2, pad=w*0.08, U=h;
  g.textAlign='center'; g.textBaseline='alphabetic';
  let cy=U*0.11;
  // ブランド
  g.fillStyle='#93a0bd';g.font=`600 ${U*0.030}px sans-serif`;g.fillText('🧪 1週間英語ラボ',cx,cy);
  // タイトル（1〜2行に自動折返し）
  cy+=U*0.078;
  g.fillStyle='#fff';g.font=`800 ${U*0.056}px sans-serif`;
  const lines=wrapText(g,m?m.name:ch.name,cx,cy,w-pad*2,U*0.066);
  cy+=(lines-1)*U*0.066;
  // 発信者
  if(inf){cy+=U*0.052;g.fillStyle='#4dd0c3';g.font=`600 ${U*0.032}px sans-serif`;g.fillText('📢 '+inf.name,cx,cy);}
  // 実践前後
  const pre=preTest(cid),post=postTest(cid);
  if(pre&&post&&pre.rate!=null&&post.rate!=null){
    cy+=U*0.078;
    g.fillStyle='#93a0bd';g.font=`600 ${U*0.030}px sans-serif`;g.fillText('実践前 → 実践後（正答率）',cx,cy);
    cy+=U*0.074;
    g.fillStyle='#fff';g.font=`800 ${U*0.070}px sans-serif`;g.fillText(`${pre.rate}%  →  ${post.rate}%`,cx,cy);
    cy+=U*0.056;
    g.fillStyle=st.rateDiff>=0?'#4ade80':'#f87171';g.font=`800 ${U*0.040}px sans-serif`;g.fillText(`${st.rateDiff>0?'+':''}${st.rateDiff}pt`,cx,cy);
  }
  // 総合スコア円
  if(st.total!=null){
    const r=U*0.125, ccy=cy+U*0.05+r;
    g.beginPath();g.arc(cx,ccy,r,0,Math.PI*2);g.strokeStyle='#243052';g.lineWidth=U*0.018;g.stroke();
    g.beginPath();g.arc(cx,ccy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*(clamp(st.total,0,100)/100));g.strokeStyle='#4dd0c3';g.lineWidth=U*0.018;g.lineCap='round';g.stroke();
    g.fillStyle='#fff';g.font=`800 ${U*0.078}px sans-serif`;g.textBaseline='middle';g.fillText(st.total,cx,ccy);g.textBaseline='alphabetic';
    g.fillStyle='#93a0bd';g.font=`600 ${U*0.026}px sans-serif`;g.fillText('総合スコア',cx,ccy+r+U*0.042);
  }
  // フッター（下端固定）
  g.fillStyle='#c9d4ee';g.font=`600 ${U*0.026}px sans-serif`;
  g.fillText(`⏱ ${fmtMin(st.totalMin)}   ・   📅 継続 ${st.retentionPct}%   ・   ${ch.start.replace(/-/g,'/')}〜`,cx,h*0.95);
}
// 先頭行のベースラインを y に置き、以降を下に描画。行数を返す
function wrapText(g,text,x,y,maxW,lh){
  const chars=[...String(text)];let line='',lines=[];
  for(const c of chars){if(g.measureText(line+c).width>maxW&&line){lines.push(line);line=c;}else line+=c;}
  lines.push(line);
  lines.forEach((l,i)=>g.fillText(l,x,y+i*lh));
  return lines.length;
}

}

// モデルの性能ランク（高いほど高性能）。「一番いいやつ」を選ぶための指標
function modelRank(prov,model){
  const m=(model||'').toLowerCase(); let s=50;
  if(/405b|large|123b|72b|70b|80b/.test(m))s+=40;
  else if(/gemini-2\.5|2\.0-flash|gemini-2/.test(m))s+=38;
  else if(/deepseek|qwen3|qwen-2\.5-72|32b|30b|27b|26b|24b/.test(m))s+=28;
  else if(/gemma|9b|8b|7b|3b|1b|mini|lite|flash-8b/.test(m))s+=10;
  if(prov==='groq')s+=6; else if(prov==='gemini')s+=4; // 速度/安定性の加点
  return s;
}
// OpenRouterは無料モデルの名前が頻繁に変わるため、有効な無料モデルを実行時に自動取得（自己修復）＋性能順に並べる
let _orModels=null;
async function getModelsFor(prov){
  if(prov!=='openrouter')return LLM_MODELS[prov];
  if(_orModels)return _orModels;
  try{
    const r=await fetch('https://openrouter.ai/api/v1/models');
    const j=await r.json();
    const free=(j.data||[]).filter(m=>m.pricing&&String(m.pricing.prompt)==='0'&&String(m.pricing.completion)==='0');
    const good=free.filter(m=>/llama-3\.|llama-4|deepseek|qwen|gemini|gemma|mistral/i.test(m.id||''));
    const list=(good.length?good:free).map(m=>m.id).filter(Boolean).sort((a,b)=>modelRank('openrouter',b)-modelRank('openrouter',a)).slice(0,6);
    _orModels=list.length?list:LLM_MODELS.openrouter;
  }catch(_){ _orModels=LLM_MODELS.openrouter; }
  return _orModels;
}
// 入れたキーのうち繋がるものを自動で使う。優先順→残りの順で総当たり
function activeProviders(){
  const keys=DB.settings.llmKeys||{};
  const all=['groq','openrouter','gemini'];
  const pref=DB.settings.llmPrefer;
  const order = (pref&&pref!=='auto') ? [pref,...all.filter(p=>p!==pref)] : all;
  return order.filter(p=>keys[p]&&String(keys[p]).trim());
}
async function callLLM(prompt,opts={}){
  const provs=activeProviders();
  if(!provs.length)throw new Error('APIキーが未設定です（⚙️設定でGroq/OpenRouter/Geminiのいずれかを入力してください）');
  const keys=DB.settings.llmKeys;
  // 候補(プロバイダ×モデル)を集めて、性能ランクの高い順に並べる＝「繋がる中で一番いいやつ」を使う
  let cands=[];
  for(const prov of provs){
    for(const model of await getModelsFor(prov)) cands.push({prov,model,rank:modelRank(prov,model)});
  }
  const pref=DB.settings.llmPrefer;
  if(pref&&pref!=='auto') cands.sort((a,b)=>(b.prov===pref)-(a.prov===pref) || b.rank-a.rank); // 指定プロバイダ最優先→性能順
  else cands.sort((a,b)=>b.rank-a.rank); // 自動＝純粋に性能順
  let last, had429=false, had404=false, had401=false, had_net=false;
  const dead=new Set(); // キー無効/CORSのプロバイダは以降スキップ
  for(const c of cands){
    if(dead.has(c.prov))continue;
    try{ return await callLLMOnce(c.prov,c.model,String(keys[c.prov]).trim(),prompt,opts); }
    catch(e){ last=e;
      if(e.code===429)had429=true; else if(e.code===404)had404=true;
      else if(e.code===401||e.code===403){had401=true; dead.add(c.prov);}
      else if(e.code==='net'){had_net=true; dead.add(c.prov);}
    }
  }
  // 429があった場合のみ、2秒待って「生きている中で最高性能」を1回だけ再試行
  if(had429){
    await new Promise(r=>setTimeout(r,2000));
    const best=cands.find(c=>!dead.has(c.prov));
    if(best){ try{ return await callLLMOnce(best.prov,best.model,String(keys[best.prov]).trim(),prompt,opts); }catch(e){ last=e; } }
  }
  // 全滅時のエラー案内
  const names={groq:'Groq',openrouter:'OpenRouter',gemini:'Gemini'};
  const tried=provs.map(p=>names[p]).join('・');
  if(had429) throw new Error(`繋がるAPIを探しましたが（${tried}）、いずれもクォータ/レート上限（429）でした。数分待って再実行するか、別のプロバイダのAPIキーを追加してください。※AI分析なしでも内蔵テスト・良い/悪い判定・比較は使えます。`);
  if(had401) throw new Error(`APIキーが無効でした（${tried}）。キーの発行元とプロバイダ欄が合っているか、前後の空白が無いか確認してください。`);
  if(had_net) throw new Error(`通信に失敗しました（CORS/ネットワーク）。別のプロバイダのキーを入れると繋がることがあります（特にGeminiは安定）。`);
  if(had404) throw new Error(`利用可能なモデルが見つかりませんでした（404）。別プロバイダのキー追加、または時間をおいて再試行してください。`);
  throw last||new Error('不明なエラー');
}
async function callLLMOnce(prov,model,key,prompt,opts={}){
  const isGem=prov==='gemini';
  const base=prov==='openrouter'?'https://openrouter.ai/api/v1/chat/completions':'https://api.groq.com/openai/v1/chat/completions';
  const url=isGem?`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`:base;
  const gemBody={contents:[{parts:[{text:prompt}]}]};
  if(opts.system)gemBody.systemInstruction={parts:[{text:opts.system}]};
  if(opts.json)gemBody.generationConfig={responseMimeType:'application/json'};
  const msgs=[]; if(opts.system)msgs.push({role:'system',content:opts.system});
  msgs.push({role:'user',content:prompt});
  const oaiBody={model,messages:msgs,temperature:opts.json?0.4:0.6};
  if(opts.json)oaiBody.response_format={type:'json_object'};
  const opt=isGem
    ? {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(gemBody)}
    : {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify(oaiBody)};
  let r;
  try{ r=await fetch(url,opt); }
  catch(net){ const e=new Error(`通信に失敗（CORS/ネットワーク）。${isGem?'ネット接続とキーを確認してください。':'このサービスがブラウザからブロックされている可能性。設定で別プロバイダに切替を。'}`); e.code='net'; throw e; }
  let j; try{ j=await r.json(); }catch(_){ j={}; }
  if(!r.ok){
    const msg=j.error?.message||('HTTP '+r.status); let m;
    if(r.status===401||r.status===403) m=`APIキーが無効か権限がありません（${r.status}）。プロバイダとキーの発行元が一致しているか確認してください。`;
    else if(r.status===400 && isGem) m=`リクエスト拒否（400）。Geminiのキーが無効な可能性。キーを貼り直してください。`;
    else if(r.status===404) m=`モデル「${model}」が見つかりません（404）。`;
    else if(r.status===429) m=`レート/クォータ上限（429）。`;
    else m=msg;
    const e=new Error(m); e.code=r.status; throw e;
  }
  lastLLMModel=model; // 実際に応答したモデルを記録
  return isGem
    ? (j.candidates?.[0]?.content?.parts?.[0]?.text||'(空の応答)')
    : (j.choices?.[0]?.message?.content||'(空の応答)');
}

  for(const p of all){

    let ok=false, err='';

  }
  modal(anyOK?'✅ 接続テスト結果':'❌ 繋がるキーがありません',
    rows.map(r=>`<div style="padding:5px 0;border-bottom:1px solid var(--line)">${r}</div>`).join('')+
    `<div class="tiny" style="margin-top:10px">${anyOK?'分析時は、繋がった（✅）ものを自動で使います。':'⚪のプロバイダは、その入力欄にAPIキーを貼れば使えます。❌はキーの発行元・前後の空白を確認、または時間をおいてください（429は無料枠の一時上限）。'}</div>`,[]);
}

/* ---------- CSV / JSON ---------- */
function toCSV(rows){
  if(!rows.length)return'';
  const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];
  const esc=v=>{v=v==null?'':(typeof v==='object'?JSON.stringify(v):String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  return keys.join(',')+'\n'+rows.map(r=>keys.map(k=>esc(r[k])).join(',')).join('\n');
}
function dl(name,text,type='text/csv'){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['﻿'+text],{type}));a.download=name;a.click();
}
function enrichedChallenges(){
  return DB.challenges.map(ch=>{const m=methodById(ch.methodId),st=computeStats(ch);
    return {challenge:ch.name,method:m?m.name:'',influencer:m&&infById(m.influencerId)?infById(m.influencerId).name:'',
      status:ch.status,start:ch.start,end:ch.end,total_score:st.total,rate_diff:st.rateDiff,score_diff:st.scoreDiff,
      total_min:st.totalMin,retention_pct:st.retentionPct,days:st.daysPracticed};});
}
function exportTableCSV(t){
  const map={challenges:()=>enrichedChallenges(),logs:()=>DB.logs,tests:()=>DB.tests,reviews:()=>DB.reviews,
    methods:()=>DB.methods,influencers:()=>DB.influencers};
  dl(`eigolab_${t}.csv`,toCSV(map[t]()));toast('CSVを書き出しました');
}
function exportAllCSV(){
  const parts=[['== 総合ランキング / チャレンジ ==',enrichedChallenges()],['== 学習法 ==',DB.methods],
    ['== 発信者 ==',DB.influencers],['== 毎日記録 ==',DB.logs],['== テスト ==',DB.tests],['== 週次レビュー ==',DB.reviews]];
  const text=parts.map(([t,rows])=>t+'\n'+toCSV(rows)).join('\n\n');
  dl('eigolab_all.csv',text);toast('全データをCSVで書き出しました');
}
function exportJSON(){dl('eigolab_backup.json',JSON.stringify(DB,null,2),'application/json');toast('バックアップを保存しました');}
function importJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{DB=JSON.parse(r.result);saveNow();DB=load();compareSel=[];openView('home');toast('復元しました');}catch(e){toast('ファイルが不正です');}};r.readAsText(f);}

/* ---------- スプシ自動同期(GAS) ---------- */
async function syncToSheet(){
  const url=DB.settings.gasUrl;if(!url)return toast('先にGAS URLを設定してください');
  toast('同期中…');
  const payload={challenges:enrichedChallenges(),methods:DB.methods,influencers:DB.influencers,
    logs:DB.logs,tests:DB.tests,reviews:DB.reviews};
  try{
    await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    toast('スプシへ送信しました（no-corsのため結果はスプシで確認）');
  }catch(e){toast('送信失敗: '+e.message);}
}

/* =========================================================================
   SVGチャート（依存なし・オフライン）
   ========================================================================= */
function barChart(data,max){
  if(!data.length)return'<div class="sub">データなし</div>';
  const mx=max||Math.max(...data.map(d=>d.v),1);
  return `<div style="display:flex;flex-direction:column;gap:7px">`+data.map(d=>`
    <div style="display:flex;align-items:center;gap:8px">
      <div class="tiny" style="flex:0 0 78px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.label)}</div>
      <div class="bar-track" style="flex:1"><div class="bar-fill" style="width:${clamp(d.v/mx*100,0,100)}%"></div></div>
      <div class="tiny" style="flex:0 0 34px;font-weight:700;color:var(--txt)">${round1(d.v)}</div></div>`).join('')+`</div>`;
}
function lineChart(data,max){
  if(data.length<1)return'<div class="sub">データなし</div>';
  const W=320,H=110,pad=16,mx=max||Math.max(...data.map(d=>d.v),1);
  const step=data.length>1?(W-pad*2)/(data.length-1):0;
  const pts=data.map((d,i)=>[pad+i*step, H-pad-(d.v/mx)*(H-pad*2)]);
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M${pts[0][0]} ${H-pad} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${pts[pts.length-1][0]} ${H-pad} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:520px">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4dd0c3" stop-opacity=".35"/><stop offset="1" stop-color="#4dd0c3" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#lg)"/><path d="${path}" fill="none" stroke="#4dd0c3" stroke-width="2.5" stroke-linejoin="round"/>
    ${pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#4dd0c3"/><text x="${p[0]}" y="${H-4}" fill="#93a0bd" font-size="8" text-anchor="middle">${esc(data[i].label)}</text>`).join('')}
  </svg>`;
}
function radarChart(pairs){return radarChartMulti([{name:'',vals:pairs}]);}
function radarChartMulti(series){
  const axes=series[0].vals.map(v=>v[0]);const N=axes.length,S=260,c=S/2,r=S*0.34,max=5;
  const colors=['#4dd0c3','#ff8a4c','#a78bfa','#f472b6','#facc15'];
  const ang=i=>-Math.PI/2+i*2*Math.PI/N;
  const pt=(i,val)=>[c+Math.cos(ang(i))*r*(val/max),c+Math.sin(ang(i))*r*(val/max)];
  let grid='';for(let g=1;g<=max;g++){grid+=`<polygon points="${axes.map((_,i)=>{const[x,y]=[c+Math.cos(ang(i))*r*(g/max),c+Math.sin(ang(i))*r*(g/max)];return x.toFixed(1)+','+y.toFixed(1)}).join(' ')}" fill="none" stroke="#2a3350" stroke-width="1"/>`;}
  const axLines=axes.map((_,i)=>{const[x,y]=pt(i,max);return `<line x1="${c}" y1="${c}" x2="${x}" y2="${y}" stroke="#2a3350"/>`}).join('');
  const labels=axes.map((a,i)=>{const[x,y]=[c+Math.cos(ang(i))*r*1.22,c+Math.sin(ang(i))*r*1.22];
    return `<text x="${x}" y="${y}" fill="#93a0bd" font-size="10" text-anchor="middle" dominant-baseline="middle">${esc(a)}</text>`}).join('');
  const polys=series.map((s,si)=>{const col=colors[si%colors.length];
    const p=s.vals.map((v,i)=>pt(i,num(v[1])).map(n=>n.toFixed(1)).join(',')).join(' ');
    return `<polygon points="${p}" fill="${col}33" stroke="${col}" stroke-width="2"/>`}).join('');
  const legend=series[0].name?`<div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:6px">${series.map((s,i)=>`<span class="tiny"><span style="color:${colors[i%colors.length]}">●</span> ${esc(s.name)}</span>`).join('')}</div>`:'';
  return `<div style="text-align:center"><svg viewBox="0 0 ${S} ${S}" style="width:100%;max-width:300px">${grid}${axLines}${polys}${labels}</svg>${legend}</div>`;
}

let modalStack=[];
function modal(title,body,actions=[]){
  const acts=(actions.filter(Boolean).map((a,i)=>`<button class="btn ${a.cls||'gho'}" data-act="${i}">${a.t}</button>`).join(''));
  modalRaw(`<div class="modal">
    <div class="mhead"><h2 style="flex:1;margin:0">${title}</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="mbody">${body}</div>
    <div class="row" style="margin-top:16px;justify-content:flex-end">${acts}</div></div>`);
  const validActs=actions.filter(Boolean);
  $$('#modalbg [data-act]').forEach(b=>b.onclick=()=>validActs[+b.dataset.act].fn());
}
function modalRaw(html){
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modalbg';bg.innerHTML=html;
  bg.onclick=e=>{if(e.target===bg)closeModal();};
  document.body.appendChild(bg);modalStack.push(bg);
}
function closeModal(){const m=modalStack.pop();if(m)m.remove();}
let toastT;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ---------- date/format helpers ---------- */
function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function challengeDayIndex(ch){const diff=Math.floor((new Date(todayStr())-new Date(ch.start))/86400000)+1;return clamp(diff,0,7);}
function fmtMin(m){m=num(m);if(m<60)return m+'分';const h=Math.floor(m/60),mm=m%60;return h+'時間'+(mm?mm+'分':'');}
function fmtSec(s){s=num(s);const m=Math.floor(s/60);return m?m+'分'+(s%60)+'秒':s+'秒';}

// PWA: Service Worker登録（http(s)配信時のみ。file://では黙ってスキップ）
// 新バージョン配信時は自動で更新→1回だけ再読み込み（旧キャッシュ画面のまま使い続ける問題の根治）
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').then(reg=>{try{reg.update();}catch(_){}}).catch(()=>{});
  let _hadSW=!!navigator.serviceWorker.controller, _swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!_hadSW){_hadSW=true;return;} // 初回インストールは再読み込み不要
    if(_swReloaded)return; _swReloaded=true;
    toast('新しいバージョンに更新します…');
    setTimeout(()=>location.reload(),600);
  });
}
